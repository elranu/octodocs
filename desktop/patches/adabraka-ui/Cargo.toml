[dependencies.bytes]
version = "1.0"

[dependencies.futures]
version = "0.3"

[dependencies.gpui]
version = "0.3"
package = "adabraka-gpui"

[dependencies.octodocs-core]
path = "../../crates/octodocs-core"

[dependencies.isahc]
version = "1.7"
optional = true

[dependencies.once_cell]
version = "1.19"

[dependencies.regex]
version = "1.10"

[dependencies.rodio]
version = "0.19"
optional = true

[dependencies.image]
version = "0.25.1"
default-features = false
features = ["png", "jpeg", "gif", "webp", "bmp"]

[dependencies.smallvec]
version = "1.13.2"

[dependencies.smol]
version = "2.0.2"

[dependencies.tree-sitter]
version = "0.25.10"

[dependencies.tree-sitter-sequel]
version = "0.3.11"

[dependencies.unicode-segmentation]
version = "1.12"
