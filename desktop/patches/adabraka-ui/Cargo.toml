[package]
edition = "2021"
rust-version = "1.70"
name = "adabraka-ui"
version = "0.3.0"
authors = ["Adabraka Team"]
build = false
exclude = [
    "assets/icons/**/*",
    "assets/audio/**/*",
    "assets/images/**/*",
]
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "A comprehensive, professional UI component library for GPUI inspired by shadcn/ui. 80+ accessible components for building beautiful desktop applications."
homepage = "https://github.com/augani/adabraka-ui"
documentation = "https://docs.rs/adabraka-ui"
readme = "README.md"
keywords = [
    "gpui",
    "ui",
    "gui",
    "components",
    "desktop",
]
categories = [
    "gui",
    "rendering",
]
license = "MIT"
repository = "https://github.com/augani/adabraka-ui"

[features]
audio = ["rodio"]
default = ["http"]
http = ["isahc"]

[lib]
name = "adabraka_ui"
path = "src/lib.rs"

