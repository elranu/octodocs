name: Release

on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Linux (primary, blocking)
  # ─────────────────────────────────────────────────────────────────────────────
  build-linux:
    name: Build · Linux x86_64
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb1-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            libwayland-dev \
            libvulkan-dev \
            vulkan-validationlayers \
            libsecret-1-dev \
            libfontconfig-dev \
            libasound2-dev \
            libssl-dev

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Clippy (required gate)
        run: cargo clippy --workspace -- -D warnings

      - name: Tests
        run: cargo test -p octodocs-core

      - name: Build release binary
        run: cargo build --release -p octodocs-app

      - name: Package artifact
        run: |
          tar -czf octodocs-linux-x86_64.tar.gz \
            -C target/release octodocs-app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: octodocs-linux-x86_64.tar.gz
          path: desktop/octodocs-linux-x86_64.tar.gz
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # macOS (experimental, non-blocking)
  # ─────────────────────────────────────────────────────────────────────────────
  build-macos:
    name: Build · macOS aarch64
    runs-on: macos-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Build release binary
        run: cargo build --release -p octodocs-app

      - name: Create .app bundle
        run: |
          mkdir -p OctoDocs.app/Contents/MacOS
          cp target/release/octodocs-app OctoDocs.app/Contents/MacOS/octodocs
          cat > OctoDocs.app/Contents/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key><string>octodocs</string>
              <key>CFBundleIdentifier</key><string>io.github.elranu.octodocs</string>
              <key>CFBundleName</key><string>OctoDocs</string>
              <key>CFBundleDisplayName</key><string>OctoDocs</string>
              <key>CFBundleVersion</key><string>1.0</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>NSHighResolutionCapable</key><true/>
              <key>LSMinimumSystemVersion</key><string>10.15</string>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          hdiutil create -volname "OctoDocs" \
            -srcfolder OctoDocs.app \
            -ov -format UDZO \
            octodocs-macos-aarch64.dmg

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: octodocs-macos-aarch64.dmg
          path: desktop/octodocs-macos-aarch64.dmg
          if-no-files-found: error

      - name: Upload raw binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: octodocs-macos-aarch64
          path: desktop/target/release/octodocs-app
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Windows (experimental, non-blocking)
  # ─────────────────────────────────────────────────────────────────────────────
  build-windows:
    name: Build · Windows x86_64
    runs-on: windows-2022
    continue-on-error: true
    defaults:
      run:
        shell: pwsh
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: desktop

      - name: Build release binary
        run: cargo build --release -p octodocs-app

      - name: Build Inno Setup installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          $binaryPath = "$PWD\target\release\octodocs-app.exe"
          $issPath = "$PWD\resources\windows\octodocs.iss"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc `
            "/dAppVersion=$version" `
            "/dBinaryPath=$binaryPath" `
            "/O$PWD" `
            $issPath
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctoDocs-Setup-x86_64.exe
          path: desktop/OctoDocs-Setup-x86_64.exe
          if-no-files-found: error

      - name: Upload raw .exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: octodocs-windows-x86_64-raw.exe
          path: desktop/target/release/octodocs-app.exe
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # GitHub Release (requires Linux; macOS & Windows are optional extras)
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-linux, build-macos, build-windows]
    # Run even if macOS/Windows jobs failed — they're continue-on-error
    if: always() && needs.build-linux.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Linux artifact (required)
        uses: actions/download-artifact@v4
        with:
          name: octodocs-linux-x86_64.tar.gz
          path: dist/

      - name: Extract Linux binary for direct download
        run: |
          tar -xzf dist/octodocs-linux-x86_64.tar.gz -C dist
          mv dist/octodocs-app dist/octodocs-linux-x86_64
          chmod +x dist/octodocs-linux-x86_64

      - name: Download macOS DMG (optional)
        if: needs.build-macos.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: octodocs-macos-aarch64.dmg
          path: dist/

      - name: Download macOS binary (optional)
        if: needs.build-macos.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: octodocs-macos-aarch64
          path: dist/

      - name: Rename macOS binary
        run: |
          if [ -f dist/octodocs-app ]; then
            mv dist/octodocs-app dist/octodocs-macos-aarch64
            chmod +x dist/octodocs-macos-aarch64
          fi

      - name: Download Windows installer (optional)
        if: needs.build-windows.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: OctoDocs-Setup-x86_64.exe
          path: dist/

      - name: Download Windows raw binary (optional)
        if: needs.build-windows.result == 'success'
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: octodocs-windows-x86_64-raw.exe
          path: dist/

      - name: Rename Windows raw binary
        run: |
          if [ -f dist/octodocs-app.exe ]; then
            mv dist/octodocs-app.exe dist/octodocs-windows-x86_64.exe
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          generate_release_notes: true
          body: |
            ## Installation

            ### Linux (x86_64)
            ```bash
            curl -f https://raw.githubusercontent.com/elranu/octodocs/main/install.sh | sh
            ```
            Or download the **pre-extracted binary** directly: `octodocs-linux-x86_64` — just `chmod +x` and run.
            Prefer the `.tar.gz` if you want the full archive.

            ### macOS (Apple Silicon)
            - **Easy install:** `octodocs-macos-aarch64` — raw binary, `chmod +x` and run directly.
            - **Full installer:** `octodocs-macos-aarch64.dmg` — open and drag **OctoDocs** to `/Applications`.
            > **Note:** The app is unsigned. Right-click → **Open** on first launch, or:
            > System Settings → Privacy & Security → **Open Anyway**

            ### Windows (x86_64)
            - **Installer:** `OctoDocs-Setup-x86_64.exe` — full wizard installer with Start Menu & optional Desktop shortcut, uninstaller, PATH setup, and `.md` file association.
            - **Portable:** `octodocs-windows-x86_64.exe` — raw binary, just download and run.
            > **Note:** The binaries are unsigned. Windows SmartScreen will warn you.
            > Click **"More info" → "Run anyway"** to launch.

            ---
            *macOS and Windows builds are experimental and may not be available for every release.*
          files: |
            dist/octodocs-linux-x86_64
            dist/octodocs-linux-x86_64.tar.gz
            dist/octodocs-macos-aarch64
            dist/octodocs-macos-aarch64.dmg
            dist/OctoDocs-Setup-x86_64.exe
            dist/octodocs-windows-x86_64.exe
